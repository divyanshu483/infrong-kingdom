<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Store - Infrong Kingdom</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
  background:#01040f;
  color:#fff;
  overflow-x:hidden;
}

body::before{
  content:"";
  position:fixed;
  width:300%;
  height:300%;
  background:
    radial-gradient(circle at 20% 30%,rgba(77,163,255,0.2),transparent 40%),
    radial-gradient(circle at 80% 70%,rgba(0,224,255,0.15),transparent 40%),
    radial-gradient(circle at 50% 50%,#020611,#000);
  animation:moveBg 25s infinite alternate ease-in-out;
  z-index:-2;
}

@keyframes moveBg{
  0%{transform:translate(0,0) scale(1)}
  100%{transform:translate(-150px,-150px) scale(1.1)}
}

body::after{
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background-image:linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                   linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
  background-size:40px 40px;
  z-index:-1;
}

.particle{
  position:fixed;
  width:3px;
  height:3px;
  background:#4da3ff;
  border-radius:50%;
  opacity:0.6;
  animation:float linear infinite;
}

@keyframes float{
  from{transform:translateY(100vh)}
  to{transform:translateY(-10vh)}
}

header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 50px;
  backdrop-filter:blur(10px);
}

.logo{
  font-size:26px;
  font-weight:700;
  color:#4da3ff;
  text-shadow:0 0 15px #4da3ff;
}

nav a{
  margin-left:20px;
  text-decoration:none;
  color:#ccc;
  transition:0.3s;
}

nav a:hover{
  color:#4da3ff;
  text-shadow:0 0 10px #4da3ff;
}

.section{
  padding:120px 20px;
  text-align:center;
}

h2{
  font-size:50px;
  margin-bottom:60px;
  background:linear-gradient(90deg,#4da3ff,#00e0ff);
  -webkit-background-clip:text;
  color:transparent;
}

.card-container{
  display:flex;
  justify-content:center;
  gap:60px;
  flex-wrap:wrap;
}

.card{
  width:320px;
  height:220px;
  border-radius:25px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:28px;
  font-weight:600;
  cursor:pointer;
  position:relative;
  overflow:hidden;
  background:linear-gradient(145deg,rgba(77,163,255,0.1),rgba(0,0,0,0.6));
  backdrop-filter:blur(20px);
  transition:0.5s;
}

/* GLOW BORDER ANIMATION */
.card::before{
  content:"";
  position:absolute;
  width:200%;
  height:200%;
  background:conic-gradient(from 0deg,#4da3ff,transparent,#00e0ff,transparent,#4da3ff);
  animation:rotate 4s linear infinite;
}

@keyframes rotate{
  0%{transform:rotate(0deg)}
  100%{transform:rotate(360deg)}
}

.card::after{
  content:"";
  position:absolute;
  inset:3px;
  border-radius:20px;
  background:#020617;
  z-index:1;
}

.card span{
  position:relative;
  z-index:2;
}

.card:hover{
  transform:scale(1.15);
  box-shadow:0 0 60px #4da3ff;
}

footer{
  text-align:center;
  padding:20px;
  color:#777;
}

</style>
</head>

<body>

<script>
for(let i=0;i<50;i++){
  let p=document.createElement("div");
  p.className="particle";
  p.style.left=Math.random()*100+"vw";
  p.style.animationDuration=(6+Math.random()*10)+"s";
  document.body.appendChild(p);
}
</script>

<header>
  <div class="logo">INFRONG KINGDOM</div>
  <nav>
    <a href="index.html">Home</a>
    <a href="index.html#server">Server</a>
    <a href="#">Store</a>
    <a href="index.html#discord">Discord</a>
  </nav>
</header>

<section class="section">
  <h2>STORE</h2>
  <div class="card-container">

    <div class="card" onclick="openRanks()">
      <span>RANKS</span>
    </div>

    <div class="card" onclick="openCrates()">
      <span>CRATES</span>
    </div>

  </div>
</section>

<footer>
  © 2026 INFRONG Network
</footer>

<script>
function openRanks(){
  window.location.href = "ranks.html";
}

function openCrates(){
  window.location.href = "crates.html";
}
</script>

</body>
</html>
