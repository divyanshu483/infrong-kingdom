<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRATES - Infrong Kingdom</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{background:#01040f;color:#fff;overflow-x:hidden;}

body::before{
content:"";position:fixed;width:300%;height:300%;
background:radial-gradient(circle at 20% 30%,rgba(77,163,255,0.2),transparent 40%),
radial-gradient(circle at 80% 70%,rgba(0,224,255,0.15),transparent 40%),
radial-gradient(circle at 50% 50%,#020611,#000);
animation:moveBg 25s infinite alternate ease-in-out;z-index:-2;}

@keyframes moveBg{0%{transform:translate(0,0)}100%{transform:translate(-150px,-150px)}}

body::after{
content:"";position:fixed;width:100%;height:100%;
background-image:linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
background-size:40px 40px;z-index:-1;}

.particle{position:fixed;width:3px;height:3px;background:#4da3ff;border-radius:50%;opacity:0.6;animation:float linear infinite;}
@keyframes float{from{transform:translateY(100vh)}to{transform:translateY(-10vh)}}

header{display:flex;justify-content:space-between;align-items:center;padding:20px 50px;backdrop-filter:blur(10px);} 
.logo{font-size:26px;font-weight:700;color:#4da3ff;text-shadow:0 0 15px #4da3ff;}
nav a{margin-left:20px;text-decoration:none;color:#ccc;transition:0.3s;}
nav a:hover{color:#4da3ff;text-shadow:0 0 10px #4da3ff;}

.section{padding:120px 20px;text-align:center;}
h2{font-size:50px;margin-bottom:60px;background:linear-gradient(90deg,#4da3ff,#00e0ff);-webkit-background-clip:text;color:transparent;}

.card-container{display:flex;justify-content:center;gap:40px;flex-wrap:wrap;}

.CRATES-card{
width:300px;padding:30px;border-radius:25px;
background:linear-gradient(145deg,rgba(77,163,255,0.1),rgba(0,0,0,0.6));
backdrop-filter:blur(20px);transition:0.5s;cursor:pointer;
}

.CRATES-card:hover{transform:scale(1.1);box-shadow:0 0 40px #4da3ff;}

.price{margin-top:10px;color:#00e0ff;font-size:20px;}

/* POPUPS */
.popup{
position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);
width:350px;padding:20px;border-radius:20px;
background:#020617;border:1px solid rgba(77,163,255,0.3);
box-shadow:0 0 40px #4da3ff;z-index:1000;transition:0.3s;
}

.popup.active{transform:translate(-50%,-50%) scale(1);}

.popup img{width:100%;border-radius:15px;margin-top:10px;}

.popup button{
margin-top:15px;width:100%;padding:10px;border:none;border-radius:20px;
background:linear-gradient(90deg,#4da3ff,#00e0ff);color:#fff;cursor:pointer;
}

.overlay{
position:fixed;width:100%;height:100%;background:rgba(0,0,0,0.7);
top:0;left:0;display:none;z-index:999;
}

.overlay.active{display:block;}

footer{text-align:center;padding:20px;color:#777;}

</style>
</head>

<body>

<div class="overlay" id="overlay" onclick="closeAll()"></div>

<script>
for(let i=0;i<50;i++){
let p=document.createElement("div");p.className="particle";
p.style.left=Math.random()*100+"vw";
p.style.animationDuration=(6+Math.random()*10)+"s";
document.body.appendChild(p);
}
</script>

<header>
<div class="logo">INFRONG KINGDOM</div>
<nav>
<a href="index.html">Home</a>
<a href="store.html">Store</a>
</nav>
</header>

<section class="section">
<h2>CRATES</h2>
<div class="card-container">

<div class="CRATES-card" onclick="openCRATES('vote')">
<h3>vote</h3>
<div class="price">₹600</div>
</div>

<div class="CRATES-card" onclick="openCRATES('spawner')">
<h3>spawner</h3>
<div class="price">₹1000</div>
</div>
  
<div class="CRATES-card" onclick="openCRATES('rare')">
<h3>RARE</h3>
<div class="price">₹1200</div>
</div>
  
<div class="CRATES-card" onclick="openCRATES('party')">
<h3>party</h3>
<div class="price">₹1300</div>
</div>
<div class="CRATES-card" onclick="openCRATES('ultimate')">
<h3>ULTIMATE</h3>
<div class="price">₹1300</div>
</div>
</div>
</section>

<!-- CRATES POPUP -->
<div class="popup" id="CRATESPopup">
<h3 id="CRATESTitle"></h3>
<img id="CRATESImg" src="https://via.placeholder.com/300x150">
<button onclick="openQR()">Buy</button>
</div>

<!-- QR POPUP -->
<div class="popup" id="qrPopup">
<h3>Scan & Pay</h3>
<img src="upi.jpg">
</div>

<footer>© 2026 INFRONG Network</footer>

<script>
function openCRATES(CRATES){
let title=document.getElementById('CRATESTitle');
let img=document.getElementById('CRATESImg');

if(CRATES==='vote'){
title.innerText='vote CRATES';
img.src = CRATES + '.jpg';
}

if(CRATES==='spawner'){
title.innerText='spawner CRATES';
img.src = CRATES + '.jpg';
}
if(CRATES==='rare'){
title.innerText='RARE CRATES';
img.src = CRATES + '.jpg';
}
if(CRATES==='party'){
title.innerText='party CRATES';
img.src = CRATES + '.jpg';
}
if(CRATES==='ultimate'){
title.innerText='ULTIMATE CRATES';
img.src = CRATES + '.jpg';
}

openPopup('CRATESPopup');
}

function openQR(){
openPopup('qrPopup');
}

function openPopup(id){
document.getElementById('overlay').classList.add('active');
document.getElementById(id).classList.add('active');
}

function closeAll(){
document.getElementById('overlay').classList.remove('active');
document.querySelectorAll('.popup').forEach(p=>p.classList.remove('active'));
}
</script>

</body>
</html>
